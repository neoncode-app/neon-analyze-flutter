name: neon_analysis
version: 1.0.0
description: >-
  Neon Code shared lint config (a fork of very_good_analysis) plus the neon_lints
  native analyzer plugin. Consumed by vernakapp / neoncode / baseapp.
publish_to: none
repository: https://github.com/neoncode-app/neon-analyze-flutter

# Base ruleset is VGV 10.2.0 (the Dart 3.11 line); SDK relaxed so the apps
# (Dart 3.11) can consume the fork.
environment:
  sdk: '>=3.4.0 <4.0.0'
